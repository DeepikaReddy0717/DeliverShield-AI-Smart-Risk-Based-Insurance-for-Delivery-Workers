{% extends "base.html" %}

{% block content %}

<style>

/* Page background */
body{
background:linear-gradient(135deg,#eef2f7,#f8fafc);
font-family:'Segoe UI',sans-serif;
}

/* Form Card */

.form-container{
background:#ffffff;
padding:50px 60px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
border:1px solid #e2e8f0;
max-width:600px;
margin:auto;
margin-top:60px;
}

/* Title */

.form-title{
font-weight:700;
font-size:26px;
color:#1e293b;
margin-bottom:35px;
text-align:center;
letter-spacing:1px;
}

/* Django form spacing */

form p{
margin-bottom:18px;
}

/* Full width inputs */

input, select, textarea{
width:100%;
padding:12px 14px;
border-radius:10px;
border:1px solid #d1d5db;
background:#f8fafc;
font-size:14px;
transition:all .25s ease;
}

/* Input focus */

input:focus, select:focus, textarea:focus{
outline:none;
border-color:#64748b;
background:#ffffff;
box-shadow:0 0 0 3px rgba(100,116,139,0.15);
}

/* Button */

.btn-success{
background:linear-gradient(135deg,#16a34a,#15803d);
border:none;
border-radius:30px;
padding:12px 30px;
font-weight:600;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
transition:all .3s ease;
}

.btn-success:hover{
transform:translateY(-2px);
box-shadow:0 12px 25px rgba(0,0,0,0.18);
}

</style>


<div class="form-container">

<h2 class="form-title">Edit Insurance Plan</h2>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<div style="text-align:center;margin-top:20px;">
<button class="btn btn-success">Update Plan</button>
</div>

</form>

</div>

{% endblock %}
