{% extends "base.html" %}

{% block content %}

<style>

/* Background */

body{
background:linear-gradient(135deg,#f1f5f9,#e2e8f0);
font-family:'Segoe UI',sans-serif;
}

/* Page title */

.page-title{
font-size:30px;
font-weight:700;
color:#1e293b;
margin-bottom:25px;
letter-spacing:.5px;
}

/* Add Plan Button */

.btn-success{
background:linear-gradient(135deg,#22c55e,#16a34a);
border:none;
padding:10px 22px;
border-radius:30px;
font-weight:600;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
transition:.3s;
}

.btn-success:hover{
transform:translateY(-2px);
box-shadow:0 12px 25px rgba(0,0,0,0.2);
}

/* Table Card */

.table-card{
background:rgba(255,255,255,0.9);
padding:30px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
border:1px solid rgba(226,232,240,0.8);
backdrop-filter:blur(6px);
}

/* Table */

table{
width:100%;
border-collapse:separate;
border-spacing:0;
overflow:hidden;
border-radius:12px;
}

/* Table header */

table th{
background:linear-gradient(135deg,#334155,#1e293b);
color:white;
padding:15px;
font-weight:600;
letter-spacing:.5px;
}

/* Table cells */

table td{
padding:14px;
border-bottom:1px solid #e2e8f0;
color:#475569;
font-size:15px;
}

/* Row hover */

table tr:hover td{
background:#f8fafc;
transition:.2s;
}

/* Action Buttons */

.btn-warning{
background:#facc15;
border:none;
border-radius:25px;
padding:6px 16px;
font-weight:500;
color:#1e293b;
}

.btn-danger{
background:#ef4444;
border:none;
border-radius:25px;
padding:6px 16px;
color:white;
}

.btn-warning:hover,
.btn-danger:hover{
transform:translateY(-1px);
opacity:.9;
}

</style>


<h2 class="page-title">Insurance Plans</h2>

<a href="/add-plan/" class="btn btn-success mb-3">
 Add Insurance Plan
</a>

<div class="table-card">

<table>

<tr>
<th>Plan</th>
<th>Weekly Premium</th>
<th>Coverage</th>
<th>Actions</th>
</tr>

{% for plan in plans %}

<tr>

<td><strong>{{ plan.name }}</strong></td>
<td>₹ {{ plan.weekly_premium }}</td>
<td>{{ plan.coverage }}</td>

<td>

<a href="/edit-plan/{{ plan.id }}/"
class="btn btn-warning btn-sm">✏ Edit</a>

<a href="/delete-plan/{{ plan.id }}/"
class="btn btn-danger btn-sm">🗑 Delete</a>

</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
