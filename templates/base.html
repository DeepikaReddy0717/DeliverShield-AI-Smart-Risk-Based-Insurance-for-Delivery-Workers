<!DOCTYPE html>
<html>
<head>
<title>DeliverShield AI</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>

/* -------- GLOBAL -------- */

body{
background: linear-gradient(135deg,#f7fee7,#ecfdf5,#f0fdf4);
min-height:100vh;
font-family: "Segoe UI", sans-serif;
color:#334155;
}


/* -------- NAVBAR -------- */

.navbar{
background: linear-gradient(135deg,#ede9fe,#e0e7ff);
backdrop-filter: blur(10px);
border-bottom:1px solid #c4b5fd;
padding:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.navbar-brand{
font-size:20px;
font-weight:600;
letter-spacing:0.5px;
color:#4c1d95 !important;
}

.navbar .btn{
border-radius:8px;
padding:6px 16px;
margin-left:10px;
background:#8b5cf6;
border:none;
color:white;
font-weight:500;
transition:all .25s;
}

.navbar .btn:hover{
background:#7c3aed;
transform:translateY(-2px);
}


/* -------- MAIN CONTAINER -------- */

.container{
margin-top:40px;
background: rgba(255,255,255,0.85);
backdrop-filter: blur(18px);
border-radius:16px;
padding:35px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}


/* -------- HEADINGS -------- */

h1,h2,h3{
font-weight:600;
margin-bottom:20px;
color:#14532d;
}


/* -------- TABLE -------- */

.table{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.04);
}

.table thead{
background:#dcfce7;
}

.table th{
border:none;
font-weight:600;
color:#166534;
}

.table td{
border-color:#ecfdf5;
}

.table tbody tr{
transition:all .2s;
}

.table tbody tr:hover{
background:#f0fdf4;
transform:scale(1.01);
}


/* -------- BUTTONS -------- */

.btn-primary{
background:#22c55e;
border:none;
border-radius:8px;
padding:8px 18px;
font-weight:500;
}

.btn-primary:hover{
background:#16a34a;
}

.btn-success{
background:#4ade80;
border:none;
border-radius:8px;
}

.btn-warning{
border-radius:8px;
}

.btn-danger{
border-radius:8px;
}


/* -------- BADGES -------- */

.badge{
padding:7px 12px;
border-radius:10px;
font-size:13px;
}

.badge.bg-danger{
background:#ef4444 !important;
}

.badge.bg-warning{
background:#facc15 !important;
color:black;
}

.badge.bg-success{
background:#22c55e !important;
}


/* -------- DASHBOARD CARDS -------- */

.card{
background: rgba(255,255,255,0.9);
border:none;
border-radius:14px;
backdrop-filter: blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:all .25s;
}

.card:hover{
transform:translateY(-5px);
}

.card-body{
padding:25px;
}

.card h4{
color:#16a34a;
}

.card h2{
font-weight:700;
color:#14532d;
}


/* -------- SCROLLBAR -------- */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#c4b5fd;
border-radius:4px;
}

</style>

</head>

<body>

<nav class="navbar">
<div class="container-fluid px-4">

<a class="navbar-brand" href="/">
🛡 DeliverShield AI
</a>

<div>
<a class="btn" href="/workers/">Workers</a>
<a class="btn" href="/plans/">Plans</a>
</div>

</div>
</nav>

<div class="container">

{% block content %}
{% endblock %}

</div>

</body>
</html>
